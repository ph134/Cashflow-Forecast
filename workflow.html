<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quotation Workflow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="workflow.css">
</head>
<body>
  <main class="workflow-shell">
    <header class="hero">
      <div>
        <p class="kicker">Standalone</p>
        <h1>Quotation Workflow</h1>
        <p class="subtitle">Separate from cashflow. Build and track approval workflows for cross-functional input.</p>
      </div>
    </header>

    <section class="panel">
      <h2>Opportunity Details</h2>
      <div class="grid-3">
        <label>Bid Manager
          <input id="odBidManager" type="text" data-kind="od" data-field="bidManager" placeholder="Bid Manager name">
        </label>
        <label>Opportunity Number
          <input id="odOpportunityNumber" type="text" data-kind="od" data-field="opportunityNumber" placeholder="OPP-0000">
        </label>
        <label>Opportunity Name
          <input id="odOpportunityName" type="text" data-kind="od" data-field="opportunityName" placeholder="Opportunity name">
        </label>
      </div>
      <div class="grid-3">
        <label>Account
          <input id="odAccount" type="text" data-kind="od" data-field="account" placeholder="Customer / Account">
        </label>
        <label>Seller
          <input id="odSeller" type="text" data-kind="od" data-field="seller" placeholder="Seller name">
        </label>
        <label>Rig Name
          <input id="odRigName" type="text" data-kind="od" data-field="rigName" placeholder="Rig name">
        </label>
      </div>
      <div class="grid-3">
        <label>ASK Ticket Number
          <input id="odAskTicketNumber" type="text" data-kind="od" data-field="askTicketNumber" placeholder="ASK-0000">
        </label>
        <label>Order Type
          <select id="odOrderType" data-kind="od" data-field="orderType">
            <option value="">-- Select --</option>
            <option value="Equipment">Equipment</option>
            <option value="Service">Service</option>
          </select>
        </label>
        <label>Forecast Category
          <input id="odForecastCategory" type="text" data-kind="od" data-field="forecastCategory" placeholder="e.g. Commit, Upside">
        </label>
      </div>
      <div class="grid-2" style="margin-top:10px">
        <label>Bid Due Date
          <input id="odBidDueDate" type="date" data-kind="od" data-field="bidDueDate">
        </label>
        <label>Placeholder Link
          <input id="odPlaceholderLink" type="text" data-kind="od" data-field="placeholderLink" placeholder="https://...">
        </label>
      </div>
      <div class="grid-2" style="margin-top:10px">
        <label>Opportunity Scope
          <textarea id="odOpportunityScope" rows="3" data-kind="od" data-field="opportunityScope"></textarea>
        </label>
        <label>Bid Manager Comment
          <textarea id="odBidManagerComment" rows="3" data-kind="od" data-field="bidManagerComment"></textarea>
        </label>
      </div>
      <div style="margin-top:10px">
        <label>Bid Manager Attachment
          <input id="odBidManagerAttachment" type="text" data-kind="od" data-field="bidManagerAttachment" placeholder="Paste SharePoint / OneDrive link">
        </label>
      </div>
    </section>

    <section class="panel">
      <h2>Workflow Setup</h2>
      <div class="grid-2">
        <label>
          Opportunity Information
          <textarea id="opportunityContext" rows="3"></textarea>
        </label>
        <label>
          Scope
          <textarea id="scope" rows="3"></textarea>
        </label>
      </div>

      <div class="grid-3">
        <label>
          Return To
          <input id="returnTo" type="text" placeholder="Me">
        </label>
        <div>
          <span class="field-label">Flow Mode</span>
          <div class="inline-row">
            <label><input type="radio" name="flowMode" value="sequence" checked> Sequence</label>
            <label><input type="radio" name="flowMode" value="parallel"> Parallel</label>
          </div>
        </div>
        <div>
          <span class="field-label">Required Inputs</span>
          <div id="roleSelection" class="pill-row"></div>
        </div>
      </div>
    </section>

    <section class="panel">
      <h2>Assignee Name List</h2>
      <div class="inline-row">
        <input id="newAssignee" type="text" placeholder="Add assignee name">
        <button id="addAssigneeBtn" type="button">Add Name</button>
      </div>
      <div id="assigneeTags" class="tag-row"></div>
    </section>

    <section class="panel">
      <h2>Role Inputs</h2>
      <div id="sequenceOrder" class="sequence-box"></div>
      <div id="roleCards" class="role-grid"></div>
    </section>

    <section class="panel">
      <h2>Notifications & Approval</h2>
      <div class="grid-3">
        <label>
          <input id="notifyEnabled" type="checkbox"> Enable notifications
        </label>
        <label>
          Channel
          <select id="notifyChannel">
            <option value="email">Email</option>
            <option value="teams">Teams</option>
          </select>
        </label>
        <label>
          Target (optional)
          <input id="notifyTarget" type="text" placeholder="name@company.com">
        </label>
      </div>

      <div class="approval-box">
        <p id="statusLine" class="status-line">Status: Draft</p>
        <div class="grid-2">
          <label>
            Decision By
            <input id="decisionBy" type="text" placeholder="Approver name">
          </label>
          <label>
            Approval Notes
            <input id="approvalNotes" type="text" placeholder="Optional note">
          </label>
        </div>
        <div class="inline-row">
          <button id="approveBtn" type="button">Approve & Return</button>
          <button id="reworkBtn" type="button">Request Rework</button>
          <button id="resetBtn" type="button">Reset Cycle</button>
          <button id="exportBtn" type="button">Export JSON</button>
        </div>
      </div>
    </section>

    <section class="panel">
      <h2>History</h2>
      <ol id="historyList" class="history-list"></ol>
    </section>
  </main>

  <script src="workflow.js"></script>
</body>
</html>
